<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Código QR de Asistencia</title>
    <link rel="icon" type="image/png" href="assets/logo-colegio.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-dark d-flex align-items-center justify-content-center vh-100">
    
    <div class="text-center bg-white p-5 rounded-4 shadow-lg">
        <h2 class="mb-2 fw-bold text-primary">Control de Asistencia</h2>
        <h4 id="fechaPantalla" class="text-muted mb-4">Cargando fecha...</h4>
        
        <div id="contenedorQR" class="d-flex justify-content-center mb-3"></div>
        
        <p class="mt-3 mb-0 fs-5">Escanea este código desde tu teléfono</p>
    </div>

    <script>
        // 1. Obtenemos la fecha exacta de hoy
        const hoy = new Date();
        const dia = String(hoy.getDate()).padStart(2, '0');
        const mes = String(hoy.getMonth() + 1).padStart(2, '0');
        const anio = hoy.getFullYear();

        // 2. Armamos la llave secreta única para hoy (Ej: asistencia_20260321)
        const codigoSecretoHoy = `asistencia_${anio}${mes}${dia}`;

        // 3. Mostramos la fecha en texto normal para que se vea bonito
        document.getElementById('fechaPantalla').textContent = hoy.toLocaleDateString('es-VE', { 
            weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' 
        });

        // 4. Generamos el Código QR con la llave secreta
        new QRCode(document.getElementById("contenedorQR"), {
            text: codigoSecretoHoy,
            width: 300,  // Tamaño grande para que sea fácil de escanear
            height: 300,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });

        // Opcional: Recargar la página automáticamente a la medianoche para cambiar el QR
        setTimeout(() => { location.reload(); }, 86400000); // 24 horas
    </script>
</body>
</html>
