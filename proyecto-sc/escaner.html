<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escanear Asistencia</title>
  <link rel="icon" type="image/png" href="./assest/logo-colegio.png">

  <!-- Librerías originales conservadas -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-page:      #F4F3EF;
      --bg-card:      #FFFFFF;
      --bg-scanner:   #0C1620;
      --border:       rgba(0,0,0,0.10);
      --text-primary: #1A1A18;
      --text-muted:   #6B6A65;
      --text-hint:    #9C9B97;
      --blue-fill:    #E6F1FB;
      --blue-main:    #185FA5;
      --blue-mid:     #378ADD;
      --green-fill:   #EAF3DE;
      --green-text:   #27500A;
      --green-border: #639922;
      --red-fill:     #FCEBEB;
      --red-text:     #501313;
      --red-border:   #A32D2D;
      --radius-md:    8px;
      --radius-lg:    12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-page:      #1A1A18;
        --bg-card:      #252522;
        --border:       rgba(255,255,255,0.10);
        --text-primary: #F0EFE9;
        --text-muted:   #9C9B97;
        --text-hint:    #6B6A65;
        --blue-fill:    #0C2A42;
        --blue-main:    #85B7EB;
        --green-fill:   #172B0A;
        --green-text:   #C0DD97;
        --green-border: #3B6D11;
        --red-fill:     #2C0F0F;
        --red-text:     #F7C1C1;
        --red-border:   #791F1F;
      }
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg-page);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .page-wrapper {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    /* ── Header card ── */
    .header-card {
      background: var(--bg-card);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.5rem 1.5rem 1.25rem;
      display: flex;
      align-items: flex-start;
      gap: 1rem;
    }

    .icon-circle {
      width: 48px; height: 48px;
      flex-shrink: 0;
      border-radius: 50%;
      background: var(--blue-fill);
      display: flex; align-items: center; justify-content: center;
    }

    .icon-circle svg { width: 22px; height: 22px; }

    .header-text h2 {
      font-size: 17px;
      font-weight: 500;
      color: var(--text-primary);
      line-height: 1.3;
    }

    .header-text p {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 3px;
      line-height: 1.45;
    }

    #saludoProfesor {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      color: var(--blue-main);
      background: var(--blue-fill);
      border-radius: 20px;
      padding: 3px 10px;
      display: inline-block;
      margin-top: 6px;
      letter-spacing: 0.02em;
    }

    /* ── Scanner card ── */
    .scanner-card {
      background: var(--bg-card);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    #reader {
      background: var(--bg-scanner);
      width: 100%;
      aspect-ratio: 1;
      position: relative;
    }

    /* html5-qrcode overrides */
    #reader video { width: 100% !important; height: 100% !important; object-fit: cover; }
    #reader img   { display: none; }

    .scanner-idle {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      pointer-events: none;
    }

    .qr-frame {
      position: relative;
      width: 148px; height: 148px;
    }

    .qr-frame svg { width: 100%; height: 100%; }

    .scan-line {
      position: absolute;
      left: 8px; right: 8px; height: 2px;
      background: linear-gradient(90deg, transparent, var(--blue-mid) 30%, var(--blue-mid) 70%, transparent);
      animation: scanAnim 2.4s ease-in-out infinite;
      top: 8px;
    }

    @keyframes scanAnim {
      0%   { top: 12px;  opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { top: 130px; opacity: 0; }
    }

    .scan-hint {
      font-size: 12px;
      color: rgba(255,255,255,0.40);
      letter-spacing: 0.05em;
    }

    .scanner-footer {
      padding: 0.9rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 0.5px solid var(--border);
    }

    .status-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green-border);
      margin-right: 6px;
      vertical-align: middle;
      animation: blink 2s ease infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }

    .status-label {
      font-size: 12px;
      color: var(--text-muted);
      vertical-align: middle;
    }

    .lib-tag {
      font-size: 11px;
      color: var(--text-hint);
      font-family: 'DM Mono', monospace;
    }

    /* ── Mensaje ── */
    #mensaje {
      background: var(--bg-card);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1rem 1.25rem;
      font-size: 13px;
      color: var(--text-primary);
      display: none;
      line-height: 1.5;
    }

    #mensaje.success {
      background: var(--green-fill);
      border-color: var(--green-border);
      color: var(--green-text);
    }

    #mensaje.error {
      background: var(--red-fill);
      border-color: var(--red-border);
      color: var(--red-text);
    }

    /* ── Botón cerrar sesión ── */
    #btnCerrarSesion {
      width: 100%;
      padding: 0.75rem;
      background: transparent;
      border: 0.5px solid var(--border);
      border-radius: var(--radius-md);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 400;
      color: var(--text-muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      letter-spacing: 0.01em;
    }

    #btnCerrarSesion:hover {
      background: var(--red-fill);
      color: var(--red-text);
      border-color: var(--red-border);
    }

    #btnCerrarSesion:active { transform: scale(0.98); }
  </style>
</head>
<body style="opacity: 0; transition: opacity 0.5s ease;">

<div class="page-wrapper">

  <!-- Header -->
  <div class="header-card">
    <div class="icon-circle">
      <svg viewBox="0 0 24 24" fill="none" stroke="#185FA5" stroke-width="1.8"
           stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7" rx="1"/>
        <rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/>
        <rect x="14" y="14" width="3" height="3"/>
        <rect x="18" y="18" width="3" height="3"/>
        <rect x="14" y="18" width="3" height="1"/>
        <rect x="18" y="14" width="3" height="3"/>
      </svg>
    </div>
    <div class="header-text">
      <h2>Registrar Asistencia</h2>
      <p>Apunta la cámara al código QR de la institución</p>
      <span id="saludoProfesor"></span>
    </div>
  </div>

  <!-- Escáner -->
  <div class="scanner-card">
    <div id="reader">
      <!-- html5-qrcode renderiza aquí; este placeholder desaparece cuando inicia -->
      <div class="scanner-idle" id="scannerIdle">
        <div class="qr-frame">
          <svg viewBox="0 0 148 148" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="2"  y="2"  width="52" height="52" rx="6" stroke="#378ADD" stroke-width="2"/>
            <rect x="12" y="12" width="32" height="32" rx="2" fill="#378ADD" fill-opacity="0.18"/>
            <rect x="94" y="2"  width="52" height="52" rx="6" stroke="#378ADD" stroke-width="2"/>
            <rect x="104" y="12" width="32" height="32" rx="2" fill="#378ADD" fill-opacity="0.18"/>
            <rect x="2"  y="94" width="52" height="52" rx="6" stroke="#378ADD" stroke-width="2"/>
            <rect x="12" y="104" width="32" height="32" rx="2" fill="#378ADD" fill-opacity="0.18"/>
            <rect x="94" y="94" width="22" height="22" rx="2" stroke="#378ADD" stroke-width="1.5"/>
            <rect x="122" y="94" width="22" height="22" rx="2" stroke="#378ADD" stroke-width="1.5"/>
            <rect x="94"  y="122" width="22" height="22" rx="2" stroke="#378ADD" stroke-width="1.5"/>
            <rect x="122" y="122" width="22" height="22" rx="2" stroke="#378ADD" stroke-width="1.5"/>
          </svg>
          <div class="scan-line"></div>
        </div>
        <span class="scan-hint">iniciando cámara…</span>
      </div>
    </div>

    <div class="scanner-footer">
      <div>
        <span class="status-dot"></span>
        <span class="status-label">Escáner activo</span>
      </div>
      <span class="lib-tag">html5-qrcode</span>
    </div>
  </div>

  <!-- Mensaje de resultado -->
  <div id="mensaje"></div>

  <!-- Cerrar sesión -->
  <button id="btnCerrarSesion">Cerrar sesión</button>

</div>

<script src="/js/escaner.js"></script>
</body>
</html>
